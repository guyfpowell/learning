services:
  postgres:
    image: postgres:16-alpine
    container_name: learning-postgres
    environment:
      POSTGRES_USER: learning_user
      POSTGRES_PASSWORD: learning_password
      POSTGRES_DB: learning_app
      POSTGRES_INITDB_ARGS: "-c timezone=UTC"
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U learning_user -d learning_app"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - learning_network

  redis:
    image: redis:7-alpine
    container_name: learning-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - learning_network

  ollama:
    image: ollama/ollama:latest
    container_name: learning-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    networks:
      - learning_network

  ai-service:
    build:
      context: /Users/guypowell/Documents/Projects/learning-ai
      dockerfile: Dockerfile
    container_name: learning-ai-service
    ports:
      - "8000:8000"
    env_file:
      - /Users/guypowell/Documents/Projects/learning-ai/.env
    environment:
      - AI_PROVIDER=ollama
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_DEFAULT_MODEL=llama3:8b
      - OLLAMA_ALT_MODEL=mistral:7b
    depends_on:
      - ollama
    networks:
      - learning_network

volumes:
  postgres_data:
  redis_data:
  ollama_data:

networks:
  learning_network:
    driver: bridge
